<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainFuel — Log in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/main.css" />

</head>
<body>

  <div class="auth-page">
    <div class="auth-card fade-up">

      <div class="auth-brand">
        <div class="auth-brand-mark">B</div>
        <span>BrainFuel</span>
      </div>

      <input type="radio" name="auth-tab" id="tab-login" checked />
      <input type="radio" name="auth-tab" id="tab-signup" />

      <div class="auth-tabs">
        <label class="tab-label" for="tab-login">Log in</label>
        <label class="tab-label" for="tab-signup">Sign up</label>
      </div>

      <div class="auth-panels">

        <div class="auth-panel panel-login">
          <h2 class="auth-heading">Welcome back</h2>
          <p class="auth-sub">Log in to your BrainFuel dashboard.</p>
          <div class="form-group">
            <label class="form-label" for="l-email">Email address</label>
            <input class="form-input" type="email" id="l-email" placeholder="you@email.com" />
            <span class="field-error" id="l-email-err"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="l-pw">Password</label>
            <input class="form-input" type="password" id="l-pw" placeholder="Your password" />
            <span class="field-error" id="l-pw-err"></span>
          </div>
          <div class="form-row">
            <label class="remember-label">
              <input type="checkbox" id="l-remember" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button class="btn-submit" id="btn-login" type="button">Log in</button>
          <div class="auth-divider">or</div>
          <button class="btn-google" type="button">
            <span class="google-dot"></span>
            Continue with Google
          </button>
          <p class="auth-terms">
            By logging in you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.
          </p>
        </div>

        <div class="auth-panel panel-signup" id="signup">
          <h2 class="auth-heading">Create account</h2>
          <p class="auth-sub">Join BrainFuel — it's free for students.</p>
          <div class="form-group">
            <label class="form-label" for="s-name">Full name</label>
            <input class="form-input" type="text" id="s-name" placeholder="Your full name" />
            <span class="field-error" id="s-name-err"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-email">Email address</label>
            <input class="form-input" type="email" id="s-email" placeholder="you@email.com" />
            <span class="field-error" id="s-email-err"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-uni">University / School</label>
            <input class="form-input" type="text" id="s-uni" placeholder="e.g. Chitkara University" />
            <span class="field-error" id="s-uni-err"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-pw">Password</label>
            <input class="form-input" type="password" id="s-pw" placeholder="Min. 8 characters" />
            <span class="field-error" id="s-pw-err"></span>
            <div class="pw-strength"><div class="pw-bar" id="pw-bar"></div></div>
            <span class="pw-label" id="pw-label"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-pw2">Confirm password</label>
            <input class="form-input" type="password" id="s-pw2" placeholder="Re-enter password" />
            <span class="field-error" id="s-pw2-err"></span>
          </div>
          <button class="btn-submit" id="btn-signup" type="button">Create account</button>
          <div class="auth-divider">or</div>
          <button class="btn-google" type="button">
            <span class="google-dot"></span>
            Continue with Google
          </button>
          <p class="auth-terms">
            By signing up you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.
          </p>
        </div>

      </div>
    </div>
  </div>

  <script>
    if (window.location.hash === '#signup') {
      document.getElementById('tab-signup').checked = true;
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
    }
    function clearErrors(...ids) { ids.forEach(id => showError(id, '')); }
    function markInvalid(inputId, errId, msg) {
      document.getElementById(inputId).classList.add('input-error');
      showError(errId, msg);
      return false;
    }
    function markValid(inputId) { document.getElementById(inputId).classList.remove('input-error'); }
    function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim()); }

    const pwInput = document.getElementById('s-pw');
    const pwBar = document.getElementById('pw-bar');
    const pwLabel = document.getElementById('pw-label');
    pwInput.addEventListener('input', function() {
      const val = this.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['','#ef4444','#f59e0b','#84cc16','#22c55e'];
      const widths = ['0%','25%','50%','75%','100%'];
      const levels = ['','Weak','Fair','Good','Strong'];
      pwBar.style.width = val.length ? widths[score] : '0%';
      pwBar.style.background = colors[score];
      pwLabel.textContent = val.length ? levels[score] : '';
      pwLabel.style.color = colors[score];
    });

    document.getElementById('btn-login').addEventListener('click', function() {
      const email = document.getElementById('l-email').value.trim();
      const pw = document.getElementById('l-pw').value;
      clearErrors('l-email-err','l-pw-err');
      markValid('l-email'); markValid('l-pw');
      let valid = true;
      if (!email) { markInvalid('l-email','l-email-err','Email is required.'); valid = false; }
      else if (!isValidEmail(email)) { markInvalid('l-email','l-email-err','Enter a valid email.'); valid = false; }
      if (!pw) { markInvalid('l-pw','l-pw-err','Password is required.'); valid = false; }
      else if (pw.length < 8) { markInvalid('l-pw','l-pw-err','Minimum 8 characters.'); valid = false; }
      if (valid) window.location.href = 'index.html';
    });

    document.getElementById('btn-signup').addEventListener('click', function() {
      const name = document.getElementById('s-name').value.trim();
      const email = document.getElementById('s-email').value.trim();
      const uni = document.getElementById('s-uni').value.trim();
      const pw = document.getElementById('s-pw').value;
      const pw2 = document.getElementById('s-pw2').value;
      clearErrors('s-name-err','s-email-err','s-uni-err','s-pw-err','s-pw2-err');
      ['s-name','s-email','s-uni','s-pw','s-pw2'].forEach(markValid);
      let valid = true;
      if (!name) { markInvalid('s-name','s-name-err','Name is required.'); valid = false; }
      if (!email) { markInvalid('s-email','s-email-err','Email is required.'); valid = false; }
      else if (!isValidEmail(email)) { markInvalid('s-email','s-email-err','Enter a valid email.'); valid = false; }
      if (!uni) { markInvalid('s-uni','s-uni-err','Institution is required.'); valid = false; }
      if (!pw) { markInvalid('s-pw','s-pw-err','Password is required.'); valid = false; }
      else if (pw.length < 8) { markInvalid('s-pw','s-pw-err','Minimum 8 characters.'); valid = false; }
      if (!pw2) { markInvalid('s-pw2','s-pw2-err','Please confirm password.'); valid = false; }
      else if (pw && pw !== pw2) { markInvalid('s-pw2','s-pw2-err','Passwords do not match.'); valid = false; }
      if (valid) window.location.href = 'index.html';
    });

    document.querySelectorAll('.form-input').forEach(function(input) {
      input.addEventListener('input', function() {
        this.classList.remove('input-error');
        const errSpan = document.getElementById(this.id + '-err');
        if (errSpan) { errSpan.textContent = ''; errSpan.style.display = 'none'; }
      });
    });
  </script>
</body>
</html>
